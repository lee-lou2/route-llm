# newsyslog example for a local route-llm launchd service.
# Copy this file to /etc/newsyslog.d/route-llm.conf and replace
# /path/to/route-llm with the checkout directory that owns logs/.
#
# logfilename                                      mode count size  when flags
/path/to/route-llm/logs/api-router.out.log        644  7     1024  *    Z
/path/to/route-llm/logs/api-router.err.log        644  7     1024  *    Z
